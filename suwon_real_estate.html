    else{rK=k;rA=k==='d'?false:true}
    rF.sort(function(a,b){
        var va=a[k],vb=b[k];
        return typeof va==='string'?(rA?va.localeCompare(vb):vb.localeCompare(va)):(rA?va-vb:vb-va)
    });
    rPg=0;rRT();
}
function rRT(){
    var s=rPg*PS,e=Math.min(s+PS,rF.length);
    var sl=rF.slice(s,e);
    document.getElementById('rCnt').innerText='('+rF.length+'건)';
    var h='';
    sl.forEach(function(r){
        var dc=r.dong==='망포동'?'text-orange-600':r.dong==='영통동'?'text-blue-600':'text-emerald-600';
        var py=r.py || Math.round(r.price/(r.area/3.305));
        var tc=r.type==='전세'?'bg-blue-100 text-blue-700':'bg-red-100 text-red-700';
        h+='<tr class="hover:bg-slate-50 border-b border-slate-50"><td class="px-3 py-3 text-slate-600">'+r.d+'</td><td class="px-3 py-3"><span class="text-[10px] font-bold px-1.5 py-0.5 rounded '+tc+'">'+r.type+'</span></td><td class="px-3 py-3 font-medium '+dc+'">'+r.dong+'</td><td class="px-3 py-3 font-medium">'+r.apt+'</td><td class="px-3 py-3 text-right">'+r.area+'㎡</td><td class="px-3 py-3 text-right">'+r.floor+'층</td><td class="px-3 py-3 text-right font-bold">'+(r.price/10000).toFixed(1)+'억 <span class="text-[10px] text-slate-400 font-normal">('+r.price.toLocaleString()+')</span></td><td class="px-3 py-3 text-right text-indigo-600 font-medium">'+py.toLocaleString()+'</td></tr>';
    });
    document.getElementById('rB').innerHTML=h;
    var tp=Math.ceil(rF.length/PS);
    var pg='';
    if(tp>1){
        pg+='<button onclick="rPg=Math.max(0,rPg-1);rRT()" class="px-3 py-1 text-sm rounded border bg-white hover:bg-slate-50">&lt;</button><span class="text-sm text-slate-500 mx-2">'+(rPg+1)+' / '+tp+'</span><button onclick="rPg=Math.min('+(tp-1)+',rPg+1);rRT()" class="px-3 py-1 text-sm rounded border bg-white hover:bg-slate-50">&gt;</button>';
    }
    document.getElementById('rP').innerHTML=pg;
}
function dnCSV(){
    var c='거래일,구분,동,아파트명,면적,층,금액(만원),평당가\n';
    rF.forEach(r=>{
        var py=r.py || Math.round(r.price/(r.area/3.305));
        c+=[r.d,r.type,r.dong,r.apt,r.area,r.floor,r.price,py].join(',')+'\n';
    });
    var b=new Blob(["\ufeff"+c],{type:'text/csv;charset=utf-8;'});
    var link=document.createElement("a");
    link.href=URL.createObjectURL(b);
    link.download="suwon_real_estate_data.csv";
    link.click();
}
function setPd(n){cPd=n;drawChart();document.querySelectorAll('#periodBtns .pb').forEach(function(b){b.classList.toggle('active',parseInt(b.dataset.m)===n)})}
function drawChart(){if(!gD||!gM)return;var ml=gM.slice(-cPd);var lb=ml.map(function(m){return m.substring(2,4)+'년'+parseInt(m.substring(4,6))+'월'});var ds=A.map(function(a){return{label:a.nm,data:(gD[a.id]||[]).slice(-cPd),borderColor:a.c,backgroundColor:a.c+'15',borderWidth:2.5,tension:.3,pointRadius:3,pointHoverRadius:6,borderDash:a.d}});if(ch)ch.destroy();ch=new Chart(document.getElementById('priceChart').getContext('2d'),{type:'line',data:{labels:lb,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+(c.parsed.y/10000).toFixed(2)+'억'}}},legend:{position:'bottom',labels:{boxWidth:20,font:{size:11}}}},scales:{y:{ticks:{callback:function(v){return v/10000+'억'}},grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}}})}
function renderAll(data,months){
    gD=data;gM=months;
    if(INJECTED_TIMESTAMP)document.getElementById('updateTime').innerText='업데이트: '+INJECTED_TIMESTAMP;
    
    var pb='';
    [{l:'12개월',v:12},{l:'6개월',v:6},{l:'3개월',v:3},{l:'1개월',v:1}].forEach(function(p){
        pb+='<button class="pb'+(p.v===12?' active':'')+'" data-m="'+p.v+'" onclick="setPd('+p.v+')">'+p.l+'</button>';
    });
    document.getElementById('periodBtns').innerHTML=pb;

    var h='';
    D.forEach(function(dg){
        h+='<div class="mb-5"><h3 class="text-sm font-bold ml-1 mb-2 flex items-center gap-1">'+dg.i+' '+dg.n+'</h3><div class="grid grid-cols-2 md:grid-cols-'+Math.min(dg.a.length,4)+' gap-3">';
        dg.a.forEach(function(a){
            var p=data[a.id];if(!p||p.length<2)return;
            var cur=p[p.length-1],prev=p[p.length-2],diff=cur-prev;
            var pct=prev?((diff/prev)*100).toFixed(1):'0';
            var tc=diff>0?'text-red-500':diff<0?'text-blue-500':'text-slate-400';
            var ar=diff>0?'↑':diff<0?'↓':'→';
            
            // Peak/Gap Logic from 10y data
            var aData = typeof INJECTED_ANALYSIS_DATA !== 'undefined' ? INJECTED_ANALYSIS_DATA[a.id] : null;
            var peak = aData ? aData.peak : cur;
            var drop = aData && peak > cur ? Math.round((cur - peak) / peak * 100) : 0;
            
            h+='<div onclick="oM(\''+a.id+'\')" class="cursor-pointer glass rounded-xl p-3 border-l-4 hover:-translate-y-1 transition-all hover:shadow-md relative overflow-hidden" style="border-left-color:'+a.c+'">';
            if(drop <= -5) h+='<span class="absolute top-0 right-0 bg-red-500 text-white text-[9px] px-1.5 py-0.5 rounded-bl-lg font-bold">고점대비 '+drop+'%</span>';
            h+='<h4 class="text-xs font-bold text-slate-500 truncate">'+a.nm+'</h4>';
            h+='<div class="flex flex-wrap gap-1 mt-1">';
            if(a.t) a.t.forEach(function(tag){ h+='<span class="text-[9px] bg-slate-100 text-slate-500 px-1 py-0.5 rounded">'+tag+'</span>'; });
            h+='</div>';
            h+='<div class="text-[10px] text-slate-400 mt-1 flex gap-1"><span>연식 '+a.y+'</span><span>| 주차 '+a.p+'</span></div>';
            h+='<div class="text-xl font-extrabold mt-1">'+(cur/10000).toFixed(1)+'<span class="text-sm text-slate-400 ml-1">억</span></div><div class="text-xs font-bold '+tc+' mt-1">'+ar+' '+(Math.abs(diff/10000)).toFixed(1)+'억 ('+pct+'%)</div></div>';
        });
        h+='</div></div>';
    });
    document.getElementById('dongSec').innerHTML=h;
    drawChart();drawVolChart();rAn(data);rNw();
    if(typeof lucide!=='undefined')lucide.createIcons();
}

function drawVolChart(){
    if(!INJECTED_RAW || !gM) return;
    var v={}; gM.forEach(m=>{v[m]=0});
    INJECTED_RAW.forEach(r=>{
        var m=r.d.replace(/\./g,'').substring(0,6);
        if(v[m]!==undefined) v[m]++;
    });
    var ds=[{label:'거래건수',data:gM.map(m=>v[m]),backgroundColor:'#6366f1',borderRadius:6}];
    if(vh) vh.destroy();
    vh=new Chart(document.getElementById('volChart').getContext('2d'),{
        type:'bar',data:{labels:gM.map(m=>m.substring(2,4)+'년'+parseInt(m.substring(4,6))+'월'),datasets:ds},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}}
    });
}

function rAn(data){
    var an = INJECTED_ANALYSIS || {};
    var h='<div class="p-4 rounded-xl '+(an.bull?'bg-red-50 border border-red-100':'bg-blue-50 border border-blue-100')+'">';
    h+='<p class="font-extrabold text-base mb-2 '+(an.bull?'text-red-700':'text-blue-700')+'">'+(an.summary || '시장 분석 중...')+'</p>';
    h+='<div class="text-xs text-slate-600 leading-relaxed mb-4 space-y-1">';
    (an.details || []).forEach(d=>{ h+='<p>• '+d+'</p>'; });
    h+='</div>';
    h+='<div class="space-y-1.5 text-[11px] border-t '+(an.bull?'border-red-100':'border-blue-100')+' pt-3">';
    var sorted = A.map(a=>({nm:a.nm, p:data[a.id]})).filter(x=>x.p&&x.p.length>=4);
    sorted.sort((a,b)=>(b.p[b.p.length-1]-b.p[b.p.length-4])-(a.p[a.p.length-1]-a.p[a.p.length-4]));
    sorted.slice(0,5).forEach(function(d){
        var diff = d.p[d.p.length-1]-d.p[d.p.length-4];
        var c=diff>0?'text-red-600':diff<0?'text-blue-600':'text-slate-500';
        var t=diff>0?'+'+(diff/10000).toFixed(1)+'억':(diff/10000).toFixed(1)+'억';
        h+='<div class="flex justify-between items-center"><span>'+d.nm+'</span><span class="font-bold '+c+'">3개월 '+t+'</span></div>';
    });
    h+='</div></div>';
    document.getElementById('mktA').innerHTML=h;
}

        }
    }
    document.getElementById('mB').innerHTML=tb;

    var peak = aData ? aData.peak : cur;
    var drop = aData && peak > cur ? Math.round((cur - peak) / peak * 100) : 0;
    var tagsHtml = apt.t ? apt.t.map(t=>'<span class="bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded text-[10px] font-bold">'+t+'</span>').join('') : '';
    document.getElementById('mSummary').innerHTML='<div class="mb-2 pb-2 border-b border-slate-200">연식: <b>'+apt.y+'</b> | 세대당 주차: <b>'+apt.p+'</b> | 용적률: <b>'+apt.f+'</b></div><div class="flex flex-wrap gap-1 mb-2">'+tagsHtml+'</div>최근 거래 <b>'+raw.length+'건</b> | 중위가 <b>'+(cur/10000).toFixed(1)+'억</b> | 10년 전고점 <b>'+(peak/10000).toFixed(1)+'억</b>';
    var mom=cur-prices[Math.max(0,prices.length-4)];
    var h_mom=mom>0?'<p><strong class="text-indigo-900">🔥 3개월 상승</strong><br>+'+(mom/10000).toFixed(1)+'억 상승</p>':mom<0?'<p><strong class="text-indigo-900">📉 3개월 조정</strong><br>'+(mom/10000).toFixed(1)+'억 하락</p>':'<p><strong class="text-indigo-900">⚖️ 보합</strong><br>박스권 흐름</p>';
    if(drop<=-5) h_mom+='<div class="mt-3 pt-3 border-t border-indigo-100 text-xs text-indigo-700">⚠️ 전고점 대비 <b>'+drop+'% 하락</b> 중입니다.</div>';
    document.getElementById('mI').innerHTML=h_mom;
    
    document.getElementById('modal').classList.remove('hidden');

}

function initCalcTab(){
    var sel = document.getElementById('calcAptSelect');
    if(sel.options.length <= 1) {
        A.forEach(a => {
            var opt = document.createElement('option');
            opt.value = a.id;
            opt.textContent = a.dn + ' ' + a.nm;
            sel.appendChild(opt);
        });
    }
    calcLoan();
}

function calcLoan() {
    var sel = document.getElementById('calcAptSelect');
    var id = sel.value;
    var price = 0;
    
    if(id && typeof INJECTED_ANALYSIS_DATA !== 'undefined' && INJECTED_ANALYSIS_DATA[id]) {
        price = INJECTED_ANALYSIS_DATA[id].curr;
    } else if (id && gD && gD[id] && gD[id].length > 0) {
        price = gD[id][gD[id].length-1];
    }
    
    if(!price) {
        document.getElementById('calcResult').innerHTML = '<div class="text-center text-slate-500 py-4">단지를 선택하시면 필요 자금이 계산됩니다.</div>';
        return;
    }

    var cash = parseInt(document.getElementById('calcCash').value) || 0;
    var loanNeeded = price - cash;
    if (loanNeeded < 0) loanNeeded = 0;
    
    // Simplified acquisition tax (1.1% ~ 3.3%)
    var taxRate = 0.011;
    if (price > 60000 && price <= 90000) taxRate = 0.022;
    else if (price > 90000) taxRate = 0.033;
    var tax = price * taxRate;
    
    // Monthly interest (Assume 4.0% annual)
    var monthlyInterest = (loanNeeded * 10000 * 0.04) / 12; // in KRW
    
    var h = '<div class="flex justify-between pb-2 mb-2 border-b border-indigo-50"><span class="text-slate-500">최근 실거래가:</span> <b class="text-lg">'+(price/10000).toFixed(1)+'억</b></div>';
    h += '<div class="flex justify-between items-center py-1"><span class="text-slate-600">필요 대출금:</span> <b class="text-xl '+(loanNeeded>0?'text-red-600':'text-indigo-600')+'">'+(loanNeeded/10000).toFixed(1)+'억</b></div>';
    h += '<div class="flex justify-between items-center py-1"><span class="text-slate-600">예상 취득세:</span> <b>대략 '+Math.round(tax).toLocaleString()+'만원</b></div>';
    if(loanNeeded > 0) {
        h += '<div class="flex justify-between items-center py-1 mt-2 bg-indigo-50 p-2 rounded"><span class="text-indigo-900 font-bold">예상 월 이자 (4% 가정):</span> <b class="text-indigo-700 text-lg">'+Math.round(monthlyInterest/10000).toLocaleString()+'만원</b></div>';
    }
    document.getElementById('calcResult').innerHTML = h;
}

function renderPeakAnalysis(){
    var h='';
    if(typeof INJECTED_ANALYSIS_DATA === 'undefined') return;
    A.forEach(a=>{
        var data = INJECTED_ANALYSIS_DATA[a.id];
        if(!data) return;
        var cur = data.curr;
        var peak = data.peak;
        var diff = cur - peak;
        var max_drop_pct = data.drop;
        var ratio = data.ratio;
        var dc = a.dn==='망포동'?'text-orange-600':a.dn==='영통동'?'text-blue-600':'text-emerald-600';
        var rc = ratio>=95?'text-red-600':ratio>=85?'text-amber-600':'text-slate-500';
        
        h+='<tr class="hover:bg-slate-50 border-b border-slate-50">';
        h+='<td class="px-3 py-4 font-medium '+dc+'">'+a.dn+'</td>';
        h+='<td class="px-3 py-4 font-bold">'+a.nm+'</td>';
        h+='<td class="px-3 py-4 text-right font-bold">'+(cur/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right text-indigo-600 font-bold">'+(peak/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right text-red-500 font-bold">-'+max_drop_pct+'%</td>';
        h+='<td class="px-3 py-4 text-right '+(diff<0?'text-blue-500':'text-slate-400')+'">'+(diff/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right font-extrabold '+rc+'">'+ratio+'%</td>';
        h+='</tr>';
    });
    document.getElementById('peakB').innerHTML=h;
}

function renderGapAnalysis(){
    var h='';
    if(typeof INJECTED_ANALYSIS_DATA === 'undefined') return;
    
    // 전세가율 내림차순 정렬
    var sortedA = [...A].sort((a,b) => {
        var aData = INJECTED_ANALYSIS_DATA[a.id];
        var bData = INJECTED_ANALYSIS_DATA[b.id];
        return (bData ? bData.jeonse_ratio : 0) - (aData ? aData.jeonse_ratio : 0);
    });

    sortedA.forEach(a=>{
        var data = INJECTED_ANALYSIS_DATA[a.id];
        if(!data) return;
        var cur = data.curr;
        var jeonse = data.jeonse;
        var gap = data.gap;
        var ratio = data.jeonse_ratio;
        var dc = a.dn==='망포동'?'text-orange-600':a.dn==='영통동'?'text-blue-600':'text-emerald-600';
        
        // Highlight logic (갭 2.5억 이하이거나 전세가율 65% 이상 하이라이트)
        var gapClass = gap <= 25000 ? 'text-red-600 font-extrabold bg-red-50' : 'text-indigo-600 font-bold';
        var ratioClass = ratio >= 65 ? 'text-red-600 font-extrabold' : 'font-bold';
        
        h+='<tr class="hover:bg-slate-50 border-b border-slate-50">';
        h+='<td class="px-3 py-4 font-medium '+dc+'">'+a.dn+'</td>';
        h+='<td class="px-3 py-4 font-bold">'+a.nm+'</td>';
        h+='<td class="px-3 py-4 text-right">'+(cur/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right">'+(jeonse/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right '+gapClass+'">'+(gap/10000).toFixed(1)+'억</td>';
        h+='<td class="px-3 py-4 text-right '+ratioClass+'">'+ratio+'%</td>';
        h+='</tr>';
    });
    document.getElementById('gapB').innerHTML=h;
}

function cM(){document.getElementById('modal').classList.add('hidden')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===e.currentTarget)cM()});


document.addEventListener('DOMContentLoaded',function(){

        renderAll(INJECTED_DATA,INJECTED_MONTHS);
    } else {
        // Fallback for demo
        var d=new Date(),m=[];for(var i=11;i>=0;i--){var t=new Date(d.getFullYear(),d.getMonth()-i,1);m.push(t.getFullYear().toString()+(t.getMonth()+1).toString().padStart(2,'0'))}
        var b={mangpo_hillstate:110000,mangpo_ipark:100000,mangpo_skview:90000,mangpo_sujain:80000,yeongtong_edupark:83000,yeongtong_dongbo:62000,yeongtong_shinmyung:60000,maegyo_skview:95000,maegyo_hillstate:82000};var dm={};for(var k in b){dm[k]=[];var v=b[k];for(var j=0;j<12;j++){v+=Math.floor(Math.random()*2000-700);dm[k].push(v)}}
        renderAll(dm,m);
    }
    rF=INJECTED_RAW||[];
    rRT();
});
