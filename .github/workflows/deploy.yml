# GitHub Actions workflow for automatic pipeline and GitHub Pages deployment
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 02:00 UTC

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt"

      - name: Run data pipeline
        run: |
          python run_pipeline.py

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment URL
        run: echo "Site deployed at https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
